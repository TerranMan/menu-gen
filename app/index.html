<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c0392b" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Генератор меню</title>
  </head>
  <body>
    <div class="app" x-data="menuApp" x-cloak>
      <header class="top">
        <h1>🍽️ Меню на неделю</h1>
        <div class="persons" role="group" aria-label="Количество персон">
          <button
            type="button"
            class="btn-step"
            :disabled="state.persons <= minPersons"
            @click="decPersons()"
            aria-label="Меньше персон"
          >−</button>
          <span class="persons-count" x-text="state.persons" aria-live="polite"></span>
          <button
            type="button"
            class="btn-step"
            :disabled="state.persons >= maxPersons"
            @click="incPersons()"
            aria-label="Больше персон"
          >+</button>
          <span class="persons-label">персон</span>
        </div>
        <div class="toolbar">
          <button class="btn primary" @click="regenerateAll()">Сгенерировать заново</button>
        </div>
      </header>

      <template x-for="slot in menu" :key="slot.categoryId">
        <section class="category">
          <h2>
            <span class="category-title" x-text="slot.categoryName"></span>
            <span class="cat-stepper" role="group" :aria-label="`Блюд в категории ${slot.categoryName}`">
              <button
                type="button"
                class="btn-step btn-step-sm"
                :disabled="effectivePick(slot.categoryId) <= 0"
                @click="decPick(slot.categoryId)"
                aria-label="Меньше блюд"
              >−</button>
              <span class="cat-stepper-count" x-text="effectivePick(slot.categoryId)" aria-live="polite"></span>
              <button
                type="button"
                class="btn-step btn-step-sm"
                :disabled="effectivePick(slot.categoryId) >= maxPickFor(slot.categoryId)"
                @click="incPick(slot.categoryId)"
                aria-label="Больше блюд"
              >+</button>
            </span>
          </h2>
          <template x-if="slot.dishes.length === 0 && effectivePick(slot.categoryId) === 0">
            <p class="empty-hint">Категория отключена. Нажмите «+» чтобы добавить блюда.</p>
          </template>
          <template x-if="slot.dishes.length === 0 && effectivePick(slot.categoryId) > 0">
            <p class="empty-hint">Нет подходящих блюд — снимите блокировки или добавьте позиции.</p>
          </template>
          <template x-for="dish in slot.dishes" :key="dish.id">
            <div class="dish-block">
              <div class="dish-row">
                <template x-if="dish.image">
                  <img class="dish-img" :src="imageUrl(dish.image)" :alt="dish.name" loading="lazy" />
                </template>
                <template x-if="!dish.image">
                  <span class="dish-emoji-big" x-text="dishEmoji(dish, slot.categoryId)"></span>
                </template>
                <button
                  type="button"
                  class="dish-name-toggle"
                  :aria-expanded="isExpanded(dish.id)"
                  :aria-controls="`ing-${dish.id}`"
                  @click="toggleExpanded(dish.id)"
                >
                  <span class="dish-name" x-text="dish.name"></span>
                  <span class="chevron" :class="{ open: isExpanded(dish.id) }">▸</span>
                </button>
                <div class="dish-actions">
                  <button
                    class="icon-btn"
                    :class="{ active: isFavorite(dish.id) }"
                    :title="isFavorite(dish.id) ? 'Убрать из избранного' : 'В избранное'"
                    @click="toggleFavorite(dish.id)"
                  >
                    <span x-text="isFavorite(dish.id) ? '★' : '☆'"></span>
                  </button>
                  <button
                    class="icon-btn"
                    title="Заменить это блюдо"
                    @click="regenerateOne(slot.categoryId, dish.id)"
                  >↻</button>
                  <button
                    class="icon-btn"
                    title="Не показывать"
                    @click="toggleBlock(dish.id)"
                  >✕</button>
                </div>
              </div>
              <template x-if="isExpanded(dish.id)">
                <ul class="ingredients-list" :id="`ing-${dish.id}`">
                  <template x-if="(dish.ingredients ?? []).length === 0">
                    <li class="empty-hint">Без ингредиентов</li>
                  </template>
                  <template x-for="ing in scaledIngredients(dish)" :key="ing.name + '__' + ing.unit">
                    <li x-text="formatIngredient(ing)"></li>
                  </template>
                </ul>
              </template>
            </div>
          </template>
        </section>
      </template>

      <div class="lists">
        <details open>
          <summary>
            🛒 Список покупок (<span x-text="shoppingList().length"></span>) —
            <span x-text="weekTotal().text"></span>
            <span class="missing-hint" x-show="weekTotal().missing > 0"
              x-text="`+ ${weekTotal().missing} без цены`"></span>
          </summary>
          <ul class="shopping">
            <template x-for="ing in shoppingList()" :key="ing.key">
              <li>
                <label class="shopping-item">
                  <input type="checkbox" />
                  <span class="shopping-name" x-text="ing.text"></span>
                </label>
                <div class="shopping-price">
                  <input
                    type="number"
                    inputmode="decimal"
                    min="0"
                    step="0.5"
                    :class="{ 'is-default': ing.isDefault }"
                    :placeholder="`₽/${ing.unit}`"
                    :value="priceFor(ing.key)"
                    @input.debounce.400ms="setPrice(ing.key, $event.target.value)"
                  />
                  <span class="shopping-cost" x-text="ing.cost != null ? `= ${ing.cost} ₽` : ''"></span>
                </div>
              </li>
            </template>
          </ul>
        </details>

        <details>
          <summary>
            ★ Избранное (<span x-text="state.favorites.length"></span>)
          </summary>
          <template x-if="favoriteDishes().length === 0">
            <p class="empty-hint">Пусто. Нажмите ☆ у блюда чтобы добавить.</p>
          </template>
          <ul>
            <template x-for="d in favoriteDishes()" :key="d.id">
              <li>
                <span x-text="d.name"></span>
                <button class="icon-btn" @click="toggleFavorite(d.id)" title="Убрать">✕</button>
              </li>
            </template>
          </ul>
        </details>

        <details>
          <summary>
            ✕ Заблокировано (<span x-text="state.blocks.length"></span>)
          </summary>
          <template x-if="blockedDishes().length === 0">
            <p class="empty-hint">Пусто.</p>
          </template>
          <ul>
            <template x-for="d in blockedDishes()" :key="d.id">
              <li>
                <span x-text="d.name"></span>
                <button class="icon-btn" @click="toggleBlock(d.id)" title="Вернуть">↺</button>
              </li>
            </template>
          </ul>
        </details>
      </div>

      <footer class="bottom">
        <span x-text="`${data.categories.reduce((s, c) => s + c.dishes.length, 0)} блюд в базе`"></span>
      </footer>
    </div>

    <style>
      [x-cloak] { display: none !important; }
    </style>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
